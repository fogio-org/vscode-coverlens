name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund

      - name: Build VSIX (smoke test)
        run: npx --yes @vscode/vsce package --no-dependencies --out theme.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: theme-vsix
          path: theme.vsix

      - name: Generate fogio-ci bot token
        if: github.event_name == 'pull_request'
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FOGIO_BOT_APP_ID }}
          private-key: ${{ secrets.FOGIO_BOT_PRIVATE_KEY }}

      - name: Prepare PR comment body
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "### ✅ CI passed"
            echo
            echo "Workflow run: [\`${GITHUB_RUN_ID}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
          } > comment.md

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}
          header: ci-validate
          path: comment.md

      - name: Approve PR on success
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr review "$PR_NUMBER" \
            --repo "$REPO" \
            --approve \
            --body "Automated approval — CI validation passed."
